name: Daily paper feeds

on:
  workflow_dispatch:
  schedule:
    - cron: "11 22 * * *"

permissions:
  contents: read

concurrency:
  group: daily-paper-feeds
  cancel-in-progress: false

jobs:
  recommend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check fork sync status
        if: ${{ github.repository != 'nehSgnaiL/paper-daily-feed' }}
        run: |
          set -euo pipefail

          git remote add upstream https://github.com/nehSgnaiL/paper-daily-feed.git
          git fetch --no-tags upstream main

          if ! git merge-base --is-ancestor upstream/main HEAD; then
            {
              echo "### Sync fork reminder"
              echo
              echo "Your fork is behind \`nehSgnaiL/paper-daily-feed:main\`."
              echo "Sync your fork to receive the latest features and bug fixes, then rerun this workflow."
              echo
              echo "Open your fork on GitHub and click **Sync fork** -> **Update branch**."
            } >> "$GITHUB_STEP_SUMMARY"

            echo "::warning title=Sync fork recommended::Your fork is behind upstream. Sync it to receive the latest features and bug fixes."
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run build

      - name: Run recommendation feed
        env:
          APP_CONFIG: ${{ vars.APP_CONFIG }}
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMBEDDING_BASE_URL: ${{ vars.EMBEDDING_BASE_URL || secrets.EMBEDDING_BASE_URL }}
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          SENDER: ${{ secrets.SENDER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: npm start -- run

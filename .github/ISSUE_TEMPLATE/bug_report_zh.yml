name: Bug 反馈
description: 反馈配置、工作流、feed、匹配、总结或邮件发送问题。
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈问题。请提供足够的复现信息，但不要公开任何密钥或隐私信息。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已经阅读 README 中的配置说明。
          required: true
        - label: 我已经删除或打码所有 secrets、API keys、邮箱地址和 tokens。
          required: true
  - type: dropdown
    id: area
    attributes:
      label: 影响范围
      options:
        - GitHub Actions 配置
        - APP_CONFIG 或配置文件
        - Feed 获取
        - 论文匹配或排序
        - TLDR 总结生成
        - 邮件渲染或发送
        - Zotero 集成
        - 本地运行
        - 其他
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你原本预期会发生什么？
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？可以附上错误信息、workflow step 名称或截图。
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 请列出触发问题所需的最小步骤。
      placeholder: |
        1. Fork 仓库
        2. 设置 ...
        3. 运行 ...
        4. 看到 ...
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: 相关配置
      description: 只粘贴非敏感配置片段。请打码隐私值。
      render: json
  - type: input
    id: run-url
    attributes:
      label: Workflow run URL
      description: 如果问题发生在 GitHub Actions 中，请粘贴失败 run 的 URL。
  - type: textarea
    id: logs
    attributes:
      label: 日志或错误输出
      description: 粘贴最小但有用的日志片段。请打码 secrets。
      render: shell
  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 添加其他可能有助于定位问题的信息。
